name: Test APK (sideload)

# Manual one-click build for on-device testing.
# Builds the RELEASE dev-flavor APK (R8 path — the debug/D8 path crashes while
# dexing some third-party AARs, e.g. tsbackgroundfetch / androidx.lifecycle),
# signed with an EPHEMERAL keystore generated in-workflow so it needs NO org
# signing secrets and works on a fork. Output is installable & representative of
# production (minified). applicationId com.vicolo.chrono.dev ("Chrono Dev"),
# installs alongside a real Chrono.
# Trigger from the Actions tab ("Run workflow") or:
#   gh workflow run test-apk.yml --ref <branch> --repo <owner>/chrono
on:
  workflow_dispatch:

jobs:
  build:
    name: Analyze + Test + Release APK (ephemeral key)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Pub get
        run: flutter pub get

      # Generates lib/l10n -> AppLocalizations (incl. the new alarmsResetNotice getter).
      - name: Generate localizations
        run: flutter gen-l10n

      # Informational: scoped to the Phase 2 changed files (the snooze fix +
      # its regression test) so pre-existing project lints don't mask new
      # issues. continue-on-error keeps the APK building even if analyze flags
      # something — alarm.dart is a large pre-existing file that may carry
      # unrelated lints, so read this step's log for NEW issues rather than
      # expecting a hard zero.
      - name: Analyze changed files (informational)
        continue-on-error: true
        run: |
          flutter analyze \
            lib/alarm/types/alarm.dart \
            lib/alarm/logic/alarm_isolate.dart \
            lib/alarm/data/alarm_settings_schema.dart \
            test/alarm/types/alarm_snooze_test.dart

      # Informational: runs the storage tests (and the rest of the suite).
      - name: Test (informational)
        continue-on-error: true
        run: flutter test

      # Throwaway signing material so a RELEASE build works without org secrets.
      # build.gradle reads android/key.properties (if present) + android/app/release-key.jks.
      - name: Generate ephemeral keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release-key.jks \
            -storepass androidtest -keypass androidtest \
            -alias chronotest -keyalg RSA -keysize 2048 -validity 3650 \
            -dname "CN=Chrono Test, OU=Dev, O=Test, L=Test, ST=Test, C=US"
          printf 'keyAlias=chronotest\nkeyPassword=androidtest\nstorePassword=androidtest\n' > android/key.properties

      # Universal release APK (single file, R8 path — avoids the debug/D8 dexing crash).
      - name: Build release dev APK
        run: flutter build apk --release --flavor dev

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrono-dev-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 7

  # BUILD-02 exit criterion: prove the prod (F-Droid) release dependency graph
  # contains ZERO Google ML Kit / Play Services / gms artifacts. flutter_zxing is
  # the only FOSS-clean Flutter scanner (native ZXing via FFI), but its transitive
  # camera/image_picker deps could in theory pull a non-FOSS Android artifact —
  # this gate catches that deterministically (RESEARCH Pitfall 3). It targets the
  # prod flavor's RELEASE runtime classpath specifically — that is the artifact
  # F-Droid ships. A grep MATCH is the FAIL condition (exit 1); zero matches PASS.
  # This is a HARD gate (no continue-on-error), unlike the informational analyze
  # step above. Authoritative in CI only — cannot run on the dev machine (no
  # Android SDK / NDK / network).
  dependency-graph:
    name: BUILD-02 zero ML Kit (prod release classpath)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
          cache: true

      - name: Pub get
        run: flutter pub get

      # Generates lib/l10n -> AppLocalizations so Gradle configuration can resolve
      # the Flutter module without a codegen failure.
      - name: Generate localizations
        run: flutter gen-l10n

      # Throwaway signing material so the release signingConfig resolves during
      # Gradle configuration (build.gradle reads android/key.properties +
      # android/app/release-key.jks). Dependency resolution does not assemble or
      # sign, but this keeps the configuration phase clean and self-contained.
      - name: Generate ephemeral keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release-key.jks \
            -storepass androidtest -keypass androidtest \
            -alias chronotest -keyalg RSA -keysize 2048 -validity 3650 \
            -dname "CN=Chrono Test, OU=Dev, O=Test, L=Test, ST=Test, C=US"
          printf 'keyAlias=chronotest\nkeyPassword=androidtest\nstorePassword=androidtest\n' > android/key.properties

      # BUILD-02 HARD GATE: resolve the prod-flavor release runtime classpath and
      # FAIL the build if any mlkit / play-services / gms artifact is present.
      - name: Verify zero ML Kit in prod release dependency graph
        run: |
          cd android
          ./gradlew :app:dependencies --configuration prodReleaseRuntimeClasspath > deps.txt
          if grep -Eiq 'mlkit|play-services|gms' deps.txt; then
            echo "FAIL: non-FOSS dependency present in prodReleaseRuntimeClasspath:"
            grep -Ei 'mlkit|play-services|gms' deps.txt
            exit 1
          else
            echo "PASS: zero ML Kit / Play Services / gms in the prod release classpath"
          fi
